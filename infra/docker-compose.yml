version: '3.8'

services:
  # Text Embeddings Inference (local, BGE-base-en-v1.5, Metal-accelerated on M4)
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: agentic-ai-embeddings
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - MODEL_ID=BAAI/bge-base-en-v1.5
      - MAX_BATCH_SIZE=32
      - MAX_CLIENT_BATCH_SIZE=16
    volumes:
      - embeddings-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G

  # Redis (cache + state persistence, from Phase 1)
  redis:
    image: redis:7-alpine
    container_name: agentic-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # Chroma (vector DB, local dev)
  chroma:
    image: chromadb/chroma:latest
    container_name: agentic-ai-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS_FILE=/chroma/auth.yaml
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - PERSIST_DIRECTORY=/chroma/data
    volumes:
      - chroma-data:/chroma/data
      - ./chroma-auth.yaml:/chroma/auth.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G

  # Phoenix (observability, local dev)
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: agentic-ai-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_WORKING_DIR=/phoenix-data
    volumes:
      - phoenix-data:/phoenix-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # Postgres (optional, future requirement for complex agent state/structured data)
  postgres:
    image: postgres:16-alpine
    container_name: agentic-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=agentic_ai
      - POSTGRES_PASSWORD=change_me_in_production
      - POSTGRES_DB=agentic_ai
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_ai"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - optional

volumes:
  embeddings-data:
    driver: local
  redis-data:
    driver: local
  chroma-data:
    driver: local
  phoenix-data:
    driver: local
  postgres-data:
    driver: local

networks:
  default:
    name: agentic-ai-network

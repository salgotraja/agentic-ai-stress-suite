repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)

  - repo: local
    hooks:
      # Run mypy through the project venv so it sees the same dependency
      # graph CI does (uv run mypy src/). The mirrors-mypy hook runs in an
      # isolated env with hand-pinned additional_dependencies, which drifts
      # from pyproject.toml and produces ignore-comment errors that
      # contradict the venv. Strictness is configured in pyproject.toml,
      # not here, so both gates agree.
      - id: mypy
        name: mypy
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run mypy src/'
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/

      - id: pytest-check
        name: pytest-check
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run pytest tests/unit/ -v || true'
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]

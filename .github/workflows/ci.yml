name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN. Default scope is "write-all" on push events,
# which lets a compromised step push commits, open PRs, edit issues, etc.
# Read-only is enough for lint/test/smoke; jobs that need writes opt in
# explicitly at job level (none do today).
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (resolves to v4). Floating tags are mutable; a tag-retag
      # supply-chain swap (cf. tj-actions/changed-files, March 2025) would
      # otherwise execute attacker code with access to repo secrets.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/
      - name: isort
        run: uv run isort --check-only src/ tests/
      - name: No em-dashes (project rule)
        # Project rule forbids U+2014. The datasets/ tree is third-party
        # scraped tech docs (test corpus) and is excluded so benchmarks
        # stay reproducible. We check two encodings:
        #   1. Raw UTF-8 bytes for U+2014 - built via printf so this
        #      workflow file stays ASCII-only and portable across BSD/GNU grep.
        #   2. The JSON escape form Jupyter writes by default
        #      (ensure_ascii=True), so em-dashes inside notebook cell
        #      source appear as a six-char escape rather than UTF-8 bytes
        #      and slip past the byte grep alone. Pattern is built from
        #      pieces so ci.yml does not contain the literal escape and
        #      cannot self-match.
        run: |
          EMDASH=$(printf '\xe2\x80\x94')
          ESC_PATTERN='\'"u2014"
          BYTE_HITS=$(git ls-files -- ':!:datasets/**' ':!:results/data/**' | xargs grep -lF "$EMDASH" 2>/dev/null || true)
          ESC_HITS=$(git ls-files -- ':!:datasets/**' ':!:results/data/**' | xargs grep -lF "$ESC_PATTERN" 2>/dev/null || true)
          if [ -n "$BYTE_HITS$ESC_HITS" ]; then
            [ -n "$BYTE_HITS" ] && echo "Raw U+2014 in: $BYTE_HITS"
            [ -n "$ESC_HITS" ] && echo "Escaped em-dash in: $ESC_HITS"
            echo "::error::U+2014 (em-dash) detected in tracked file(s). Replace with hyphen (-) per project rule."
            exit 1
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (resolves to v4). Floating tags are mutable; a tag-retag
      # supply-chain swap (cf. tj-actions/changed-files, March 2025) would
      # otherwise execute attacker code with access to repo secrets.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: mypy
        run: uv run mypy src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (resolves to v4). Floating tags are mutable; a tag-retag
      # supply-chain swap (cf. tj-actions/changed-files, March 2025) would
      # otherwise execute attacker code with access to repo secrets.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run unit tests
        # --cov-fail-under=65 gates merges on coverage regression.
        # Threshold is set just below the current measured baseline (70%)
        # so merges fail loudly if coverage drops, but the gate doesn't
        # break on noise. Raise this number when coverage genuinely improves.
        run: uv run pytest tests/unit/ -v --tb=short --cov=src/ --cov-report=term-missing --cov-fail-under=65
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      # CVE gate: fail PRs that introduce known vulnerabilities into the
      # locked dependency set. Runs against the actual venv (not a hash-only
      # requirements file) so transitive pins are audited too.
      #
      # --skip-editable: this project's own package is editable; PyPI doesn't
      #   know about it and that's fine.
      #
      # --ignore-vuln entries are residuals we cannot eliminate via
      # `uv lock --upgrade` and are accepted with the rationale below.
      # Re-evaluate each on every dependency bump (delete the line if the
      # underlying package is no longer in the lockfile, or if a fix lands
      # upstream).
      #
      #   CVE-2025-69872 (diskcache 5.6.3): no fixed version published.
      #     Pulled transitively by ragas. Local on-disk cache only -- not
      #     exposed to untrusted input. Accepts pickle deserialization risk
      #     bounded to the cache directory under the service account.
      #
      #   CVE-2026-41488 (langchain-openai 1.1.10): fix at 1.1.14 is
      #     blocked by a three-way resolver conflict. crewai>=1.6.1 pins
      #     tokenizers<0.22 (via its own deps), litellm>=1.83.7 requires
      #     tokenizers==0.22.2, and langchain-openai>=1.1.14 requires
      #     openai>=2.26 which clashes with litellm 1.83.9's openai==2.24.0
      #     pin. Lifting any constraint pulls back a worse CVE set
      #     (litellm 1.83.0 ships 5 CVEs). Re-test on each crewai or
      #     litellm bump; lift the ignore the moment the trinity resolves.
      #
      #   CVE-2026-6587 (ragas 0.4.3): no fixed version published. We are
      #     on the latest ragas. Track upstream and remove this line when
      #     a patched release ships.
      - name: pip-audit
        # No --strict: it would fail on the editable skip of this project's
        # own package (always present, always skipped). Without --strict,
        # pip-audit exits non-zero only when unignored vulnerabilities exist,
        # which is exactly the gate we want.
        run: |
          uv run --with pip-audit pip-audit \
            --skip-editable \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln CVE-2026-41488 \
            --ignore-vuln CVE-2026-6587

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (resolves to v4). Floating tags are mutable; a tag-retag
      # supply-chain swap (cf. tj-actions/changed-files, March 2025) would
      # otherwise execute attacker code with access to repo secrets.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Smoke test - config loads
        run: |
          uv run python -c "
          from src.core.config import get_settings
          s = get_settings()
          print(f'Config loaded: env={s.environment}')
          "
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key
      - name: Smoke test - tools import
        run: |
          uv run python -c "
          from src.agents.tools.calculator import CalculatorTool
          t = CalculatorTool()
          result = t.execute('2 + 2')
          assert '4' in result, f'Expected 4, got {result}'
          print(f'Calculator smoke test passed: {result}')
          "

  benchmark-smoke:
    name: Benchmark Smoke (article_${{ matrix.article }})
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        article: ["01", "02", "04", "05", "06", "07", "08", "09"]
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (resolves to v4). Floating tags are mutable; a tag-retag
      # supply-chain swap (cf. tj-actions/changed-files, March 2025) would
      # otherwise execute attacker code with access to repo secrets.
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      # Per-article smoke run: SMOKE_TEST=1 makes each benchmark exit 0 right
      # after imports + module-level setup. Catches drift in benchmark entry
      # points (broken imports, missing deps, top-level errors) without
      # spinning up infrastructure (Redis, Chroma, Phoenix) or hitting LLMs.
      # OBSERVABILITY_ENABLED=false suppresses OTLP exporter noise (B2.4).
      - name: Smoke run benchmarks/run_article_${{ matrix.article }}.py
        run: uv run python benchmarks/run_article_${{ matrix.article }}.py
        env:
          SMOKE_TEST: "1"
          ENVIRONMENT: test
          OBSERVABILITY_ENABLED: "false"
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

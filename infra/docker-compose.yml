services:
  # Text Embeddings Inference - DISABLED for M4 Apple Silicon
  #
  # Teaching note: text-embeddings-inference Docker image lacks ARM64 support.
  # For M4, we run embeddings NATIVELY with PyTorch Metal backend instead.
  #
  # Why native is better for M4:
  # - sentence-transformers uses PyTorch MPS (Metal Performance Shaders)
  # - Direct GPU access without Docker overhead
  # - 5-7x faster than CPU
  # - Simpler setup, no container management
  #
  # To use embeddings on M4:
  #   from sentence_transformers import SentenceTransformer
  #   model = SentenceTransformer('BAAI/bge-base-en-v1.5')
  #   # Automatically uses M4 GPU via Metal
  #
  # For production Linux/NVIDIA GPU, uncomment and use:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2-cpu-grpc
  #   or with NVIDIA GPU:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2-cuda
  #
  # embeddings:
  #   image: ghcr.io/huggingface/text-embeddings-inference:1.2-cpu-grpc
  #   container_name: agentic-ai-embeddings
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
  #   environment:
  #     - MODEL_ID=BAAI/bge-base-en-v1.5
  #     - MAX_BATCH_SIZE=32
  #     - MAX_CLIENT_BATCH_SIZE=16
  #   volumes:
  #     - embeddings-data:/data
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:80/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2G

  # Redis (cache + state persistence, from Phase 1)
  redis:
    image: redis:7-alpine
    container_name: agentic-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # Chroma (vector DB, local dev)
  chroma:
    image: chromadb/chroma:latest
    container_name: agentic-ai-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS_FILE=/chroma/auth.yaml
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - PERSIST_DIRECTORY=/chroma/data
    volumes:
      - chroma-data:/chroma/data
      - ./chroma-auth.yaml:/chroma/auth.yaml:ro
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      test: [ "CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G

  # Phoenix (observability, local dev)
  # Teaching note: Phoenix provides local-first observability for LLM apps.
  # Used in Phase 1-5, migrated to LangFuse for production in Article 6.
  #
  # Why Phoenix for dev:
  # - Local-first: No cloud dependencies, works offline
  # - Simple setup: Single container, no config needed
  # - LLM-aware: Understands traces, spans, embeddings
  # - Visual: UI for exploring traces and debugging
  #
  # Features:
  # - Trace collection via OTLP (OpenTelemetry)
  # - Embedding visualization (UMAP projections)
  # - Latency/cost analysis per trace
  # - Session tracking for multi-turn conversations
  #
  # Healthcheck note: Phoenix container has minimal tooling (no wget, curl, bash).
  # Using Python's urllib (available in the container) for HTTP health check.
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: agentic-ai-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006" # UI and OTLP HTTP collector
      #- "4317:4317"  # OTLP gRPC collector
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_WORKING_DIR=/phoenix-data
    volumes:
      - phoenix-data:/phoenix-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6006/healthz', timeout=1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # Postgres (optional, future requirement for complex agent state/structured data)
  postgres:
    image: postgres:16-alpine
    container_name: agentic-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=agentic_ai
      - POSTGRES_PASSWORD=change_me_in_production
      - POSTGRES_DB=agentic_ai
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_ai"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    profiles:
      - optional

  # Neo4j (optional, graph RAG architecture demo - Article 1)
  # Teaching note: Neo4j is a production-grade graph database for Graph RAG.
  # Used to demonstrate enterprise-scale knowledge graph patterns.
  #
  # Why Neo4j for Graph RAG:
  # - Native graph storage (optimized for relationship traversal)
  # - Cypher query language (declarative graph queries)
  # - ACID transactions (data consistency)
  # - Scales to billions of nodes/relationships
  # - Visual browser for graph exploration
  #
  # When to use Neo4j vs NetworkX:
  # - NetworkX: Prototyping, small graphs (<10k nodes), teaching
  # - Neo4j: Production, large graphs, concurrent queries, persistence
  #
  # Access:
  # - Browser UI: http://localhost:7474
  # - Bolt protocol: bolt://localhost:7687
  # - Default credentials: neo4j/changeme123
  #
  # Production checklist:
  # - Change NEO4J_AUTH credentials (use secrets management)
  # - Configure memory heap size for your data (NEO4J_server_memory_heap_*)
  # - Enable backup strategy (neo4j-admin dump/restore)
  # - Monitor query performance (PROFILE/EXPLAIN in Cypher)
  neo4j:
    image: neo4j:5.15-community
    container_name: agentic-ai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP (Browser UI)
      - "7687:7687"  # Bolt protocol
    environment:
      # Authentication (change in production)
      - NEO4J_AUTH=neo4j/changeme123
      # Memory configuration (adjust for your dataset)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      # Plugins (APOC for graph algorithms)
      - NEO4J_PLUGINS=["apoc"]
      # Accept license
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
    profiles:
      - optional

volumes:
  # embeddings-data:  # Not needed - embeddings run natively on M4
  #   driver: local
  redis-data:
    driver: local
  chroma-data:
    driver: local
  phoenix-data:
    driver: local
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-import:
    driver: local
  neo4j-plugins:
    driver: local

networks:
  default:
    name: agentic-ai-network

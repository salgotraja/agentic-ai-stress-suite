name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/
      - name: isort
        run: uv run isort --check-only src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: mypy
        run: uv run mypy src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short --cov=src/ --cov-report=term-missing
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Smoke test - config loads
        run: |
          uv run python -c "
          from src.core.config import get_settings
          s = get_settings()
          print(f'Config loaded: env={s.environment}')
          "
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key
      - name: Smoke test - tools import
        run: |
          uv run python -c "
          from src.agents.tools.calculator import CalculatorTool
          t = CalculatorTool()
          result = t.execute('2 + 2')
          assert '4' in result, f'Expected 4, got {result}'
          print(f'Calculator smoke test passed: {result}')
          "

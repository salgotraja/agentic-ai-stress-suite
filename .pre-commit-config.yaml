repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-added-large-files
        # 2000 KB accommodates uv.lock (~1.7 MB once the full superset
        # of dependencies for all 9 articles resolves). Raising to 2 MB
        # still catches genuinely-oversized binaries while letting the
        # lockfile through.
        args: ['--maxkb=2000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the ruff floor in pyproject.toml ([dependency-groups].dev).
    # The previous 0.1.8 pin predated rules added in 0.4+ (e.g. UP042) so
    # a project-side `[tool.ruff.lint] ignore = ["UP042"]` was rejected
    # as an unknown selector. Keep this tag and the pyproject floor in
    # sync; otherwise the hook and CI's `uv run ruff check` disagree.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # black removed: it competes with ruff format on the same files and
  # makes different line-break choices around long parenthesised
  # expressions. CI's gate is `ruff format --check`, so the black hook
  # was creating commit-time churn that the CI gate then rejected. The
  # `[tool.black]` block in pyproject.toml is left for backwards-compat
  # with editor integrations; it is no longer enforced.
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)

  - repo: local
    hooks:
      # Run mypy through the project venv so it sees the same dependency
      # graph CI does (uv run mypy src/). The mirrors-mypy hook runs in an
      # isolated env with hand-pinned additional_dependencies, which drifts
      # from pyproject.toml and produces ignore-comment errors that
      # contradict the venv. Strictness is configured in pyproject.toml,
      # not here, so both gates agree.
      - id: mypy
        name: mypy
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run mypy src/'
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/

      - id: pytest-check
        name: pytest-check
        entry: bash -c 'export PATH="$HOME/.local/bin:$PATH" && uv run pytest tests/unit/ -v || true'
        language: system
        pass_filenames: false
        always_run: false
        stages: [manual]

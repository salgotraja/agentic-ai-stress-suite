# Secrets: sensitive API keys and credentials.
# Why base64: K8s Secrets store values as base64 (NOT encryption).
#   This is obfuscation only, not a security boundary. In production:
#   - Use ExternalSecrets Operator + AWS Secrets Manager / HashiCorp Vault
#   - Or use Sealed Secrets (Bitnami) for GitOps-safe encrypted secrets
#   - Never commit real API keys, even base64-encoded
#
# Why Opaque type:
#   Opaque is the generic Secret type for arbitrary key-value pairs.
#   Use kubernetes.io/tls for TLS certs, kubernetes.io/dockerconfigjson for
#   registry credentials. Opaque is correct for API keys.
#
# Decode a value to verify: echo "Z3NrX3BsYWNlaG9sZGVy" | base64 --decode
# Encode a real key:        echo -n "your-key-here" | base64
#
# IMPORTANT: Replace all placeholder values before deploying.
#   These placeholders decode to: "gsk_placeholder", "sk-ant-placeholder", "placeholder"
apiVersion: v1
kind: Secret
metadata:
  name: rag-agent-secrets
  namespace: default
type: Opaque
data:
  # Groq API key (primary LLM provider - cheapest for dev/prod iteration)
  # echo -n "gsk_placeholder" | base64
  GROQ_API_KEY: Z3NrX3BsYWNlaG9sZGVy

  # Anthropic Claude API key (quality benchmarks and fallback chain)
  # echo -n "sk-ant-placeholder" | base64
  ANTHROPIC_API_KEY: c2stYW50LXBsYWNlaG9sZGVy

  # OpenAI API key (final fallback for maximum reliability)
  # echo -n "placeholder" | base64
  OPENAI_API_KEY: cGxhY2Vob2xkZXI=

  # Cohere API key (reranking at $1/1K requests - used in Article 2)
  # echo -n "placeholder" | base64
  COHERE_API_KEY: cGxhY2Vob2xkZXI=

  # DeepSeek API key (intermediate fallback between Groq and Claude)
  # echo -n "placeholder" | base64
  DEEPSEEK_API_KEY: cGxhY2Vob2xkZXI=

  # Google Gemini API key (quality benchmark comparison)
  # echo -n "placeholder" | base64
  GOOGLE_API_KEY: cGxhY2Vob2xkZXI=

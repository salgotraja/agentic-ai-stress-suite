name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short -m "not slow"
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  benchmark-smoke:
    name: Benchmark Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run article 04 benchmark (mock mode)
        run: uv run python benchmarks/run_article_04.py --mock
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Run article 05 benchmark (mock mode)
        run: uv run python benchmarks/run_article_05.py --mock
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-benchmark-results
          path: results/data/
          retention-days: 30

  performance-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run unit tests with timing
        run: |
          uv run pytest tests/unit/ -v --tb=short --durations=20 \
            --durations-min=0.1 2>&1 | tee /tmp/test_times.txt
          # Detect regressions: any unit test >1s is suspicious
          if grep -q "FAILED\|ERROR" /tmp/test_times.txt; then
            echo "Test failures detected"
            exit 1
          fi
          echo "No regressions detected"
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

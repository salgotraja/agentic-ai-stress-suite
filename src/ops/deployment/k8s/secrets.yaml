# API key secrets for the RAG/agent service.
#
# WHY THIS FILE NO LONGER CONTAINS PLAINTEXT BASE64:
#   Kubernetes `Secret` objects are base64-encoded, NOT encrypted.
#   Anything checked into Git as `kind: Secret` is effectively cleartext.
#   The previous version of this file shipped placeholder base64 values
#   (gsk_placeholder, sk-ant-placeholder, ...) which trained anyone copying
#   the manifest to keep the same shape with real keys - exactly the
#   GitOps anti-pattern Article 8 is supposed to argue against.
#
# WHAT TO USE INSTEAD:
#   Pick ONE of the two patterns below. Both produce a runtime `Secret`
#   named `rag-agent-secrets` with the keys consumed by deployment.yaml
#   (`envFrom: secretRef: name: rag-agent-secrets`), so nothing else in
#   this directory has to change.
#
# Pattern A (canonical) - External Secrets Operator
#   docs: https://external-secrets.io/
#   - Single source of truth lives in AWS Secrets Manager / GCP Secret
#     Manager / HashiCorp Vault / Azure Key Vault.
#   - The operator pulls secrets on a refresh interval and writes a
#     real `Secret` into the cluster. Rotations propagate automatically.
#   - The manifest committed to Git contains zero secret material - only
#     references to the upstream secret name.
#
# Pattern B - Bitnami Sealed Secrets
#   docs: https://github.com/bitnami-labs/sealed-secrets
#   - The controller in the cluster owns a private key. You encrypt
#     locally with `kubeseal`, commit the encrypted manifest, and the
#     controller decrypts it back into a real `Secret` at apply time.
#   - Useful when you do NOT want a separate secrets manager but still
#     need GitOps-safe storage. Rotation requires re-sealing.
#
# DEPLOYMENT WORKFLOW (Pattern A):
#   1. Install External Secrets Operator:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#   2. Configure the SecretStore for your provider (AWS shown below).
#   3. Apply this manifest. The operator creates `rag-agent-secrets`
#      from the upstream secret. `deployment.yaml` consumes it as before.
#
# DEPLOYMENT WORKFLOW (Pattern B, commented at the bottom):
#   1. Install the Sealed Secrets controller in the cluster.
#   2. Locally:
#        kubectl create secret generic rag-agent-secrets \
#          --from-literal=GROQ_API_KEY=... [more keys] \
#          --dry-run=client -o yaml \
#          | kubeseal --format yaml > sealed-secrets.yaml
#   3. Commit `sealed-secrets.yaml` (encrypted; safe to publish) and
#      remove this ExternalSecret block.

---
# SecretStore: tells External Secrets where to fetch from.
# Example uses AWS Secrets Manager. For Vault / GCP / Azure, swap the
# `provider` block per https://external-secrets.io/.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: rag-agent-secret-store
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # IRSA (IAM Roles for Service Accounts) is the recommended
        # auth path on EKS. For other providers / clusters use the
        # equivalent workload identity binding.
        jwt:
          serviceAccountRef:
            name: rag-agent
---
# ExternalSecret: declares which upstream keys land in `rag-agent-secrets`.
# `remoteRef.key` is the path/name in your secrets manager (e.g. an AWS
# Secrets Manager secret named `prod/rag-agent/groq-api-key` storing the
# raw API token as its value).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-agent-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: rag-agent-secret-store
    kind: SecretStore
  target:
    name: rag-agent-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_AUTH_TOKEN
      remoteRef:
        key: prod/rag-agent/api-auth-token
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: prod/rag-agent/groq-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: prod/rag-agent/anthropic-api-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: prod/rag-agent/openai-api-key
    - secretKey: COHERE_API_KEY
      remoteRef:
        key: prod/rag-agent/cohere-api-key
    - secretKey: DEEPSEEK_API_KEY
      remoteRef:
        key: prod/rag-agent/deepseek-api-key
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: prod/rag-agent/google-api-key

# --- Pattern B: Sealed Secrets (alternative, commented) ---
# Generate locally and replace the ExternalSecret block above with the
# `kubeseal` output. The encrypted blob is safe to commit because only
# the in-cluster controller can decrypt it.
#
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: rag-agent-secrets
#   namespace: default
# spec:
#   encryptedData:
#     API_AUTH_TOKEN: AgB... (output of `kubeseal`)
#     GROQ_API_KEY: AgB...
#     ANTHROPIC_API_KEY: AgB...
#     OPENAI_API_KEY: AgB...
#     COHERE_API_KEY: AgB...
#     DEEPSEEK_API_KEY: AgB...
#     GOOGLE_API_KEY: AgB...
#   template:
#     metadata:
#       name: rag-agent-secrets
#       namespace: default
#     type: Opaque

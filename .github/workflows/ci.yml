name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format
        run: uv run ruff format --check src/ tests/
      - name: isort
        run: uv run isort --check-only src/ tests/
      - name: No em-dashes (project rule)
        # Project rule forbids U+2014. The datasets/ tree is third-party
        # scraped tech docs (test corpus) and is excluded so benchmarks
        # stay reproducible. The em-dash byte sequence (\xe2\x80\x94 in
        # UTF-8) is built at runtime via printf to keep this file
        # ASCII-only and portable across BSD and GNU grep.
        run: |
          EMDASH=$(printf '\xe2\x80\x94')
          if git ls-files -- ':!:datasets/**' ':!:results/data/**' | xargs grep -l "$EMDASH" 2>/dev/null; then
            echo "::error::U+2014 (em-dash) detected in tracked file(s). Replace with hyphen (-) per project rule."
            exit 1
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: mypy
        run: uv run mypy src/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run unit tests
        # --cov-fail-under=65 gates merges on coverage regression.
        # Threshold is set just below the current measured baseline (70%)
        # so merges fail loudly if coverage drops, but the gate doesn't
        # break on noise. Raise this number when coverage genuinely improves.
        run: uv run pytest tests/unit/ -v --tb=short --cov=src/ --cov-report=term-missing --cov-fail-under=65
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Smoke test - config loads
        run: |
          uv run python -c "
          from src.core.config import get_settings
          s = get_settings()
          print(f'Config loaded: env={s.environment}')
          "
        env:
          ENVIRONMENT: test
          GROQ_API_KEY: mock-key
          OPENAI_API_KEY: mock-key
      - name: Smoke test - tools import
        run: |
          uv run python -c "
          from src.agents.tools.calculator import CalculatorTool
          t = CalculatorTool()
          result = t.execute('2 + 2')
          assert '4' in result, f'Expected 4, got {result}'
          print(f'Calculator smoke test passed: {result}')
          "
